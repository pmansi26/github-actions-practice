---
name: Matrix
on:
  push:
    branches:
      - main
jobs:
  python_version:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
         python-version: [ "3.10" , "3.11" , "3.12" ]
         os: [ "windows-latest" , "ubuntu-latest" ]
    steps:
      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: check python version
        run: python --version

